server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://ocean-flask-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Static asset failures must return 404 instead of silently returning
    # index.html, otherwise browsers report CSS/JS files as text/html.
    location ~* \.(?:css|js|mjs|json|geojson|svg|png|jpg|jpeg|gif|ico|woff|woff2)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
