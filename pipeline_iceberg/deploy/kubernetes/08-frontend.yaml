apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocean-frontend
  namespace: dt
spec:
  replicas: 1
  selector:
    matchLabels: {app: ocean-frontend}
  template:
    metadata:
      labels: {app: ocean-frontend}
    spec:
      containers:
        - name: frontend
          image: dkreg.taroko:5000/ocean-frontend:0.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 3
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: ocean-frontend
  namespace: dt
spec:
  type: NodePort
  selector: {app: ocean-frontend}
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30801
