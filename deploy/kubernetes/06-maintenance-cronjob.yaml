apiVersion: batch/v1
kind: CronJob
metadata: {name: ocean-gold-maintenance, namespace: dt}
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels: {app: ocean-pipeline, stage: iceberg-maintenance}
        spec:
          restartPolicy: Never
          nodeSelector: {kubernetes.io/hostname: tkdt-worker1}
          securityContext: {runAsUser: 1000, runAsGroup: 1001, fsGroup: 1001}
          containers:
            - name: maintenance
              image: dkreg.taroko:5000/ocean-spark-client:3.5.8
              command: ["/bin/bash", "/opt/zfs/project/pipeline_iceberg/scripts/run_maintenance.sh"]
              envFrom: [{configMapRef: {name: ocean-pipeline-config}}]
              volumeMounts:
                - {name: project, mountPath: /opt/zfs/project}
                - {name: system, mountPath: /opt/zfs/sys, readOnly: true}
              resources:
                requests: {cpu: 500m, memory: 2Gi}
                limits: {cpu: "2", memory: 6Gi}
          volumes:
            - {name: project, hostPath: {path: /opt/zfs/project, type: Directory}}
            - {name: system, hostPath: {path: /opt/zfs/sys, type: Directory}}
