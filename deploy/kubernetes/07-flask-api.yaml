apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocean-flask-api
  namespace: dt
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: ocean-flask-api}
  template:
    metadata:
      labels: {app: ocean-flask-api}
    spec:
      nodeSelector: {kubernetes.io/hostname: tkdt-worker1}
      securityContext: {runAsUser: 1000, runAsGroup: 1001, fsGroup: 1001}
      containers:
        - name: api
          image: dkreg.taroko:5000/ocean-flask-api:0.3.0
          imagePullPolicy: IfNotPresent
          envFrom: [{configMapRef: {name: ocean-pipeline-config}}]
          ports:
            - {name: http, containerPort: 8000}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "2", memory: 2Gi}
          volumeMounts:
            - {name: serving, mountPath: /opt/zfs/project/data/serving, readOnly: true}
            - {name: pipeline, mountPath: /opt/zfs/project/pipeline_iceberg, readOnly: true}
      volumes:
        - name: serving
          hostPath: {path: /opt/zfs/project/data/serving, type: Directory}
        - name: pipeline
          hostPath: {path: /opt/zfs/project/pipeline_iceberg, type: Directory}
---
apiVersion: v1
kind: Service
metadata:
  name: ocean-flask-api
  namespace: dt
spec:
  type: NodePort
  selector: {app: ocean-flask-api}
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30800
